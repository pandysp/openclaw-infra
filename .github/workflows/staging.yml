# Staging Phoenix Test Pipeline
#
# Provisions a fresh VPS from scratch, verifies the full stack,
# smoke-tests model connectivity, and destroys everything.
#
# Cost: ~€0.01/run (Hetzner hourly billing)
# Duration: ~35-45 minutes
#
# One-time setup required before first run — see docs in CLAUDE.md.
#
# Security: This workflow only uses secrets.* (admin-controlled) in run commands.
# No untrusted inputs (github.event.*, head_ref, etc.) are used in shell contexts.

name: Staging Phoenix Test

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: staging-phoenix
  cancel-in-progress: false

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
  PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
  HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
  GH_TOKEN: ${{ secrets.STAGING_GITHUB_TOKEN }}

jobs:
  phoenix:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Setup ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Pulumi dependencies
        run: npm ci

      - name: Install Ansible
        run: pip install ansible

      - name: Install hcloud CLI
        run: |
          VERSION=$(curl -s https://api.github.com/repos/hetznercloud/cli/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/hetznercloud/cli/releases/download/${VERSION}/hcloud-linux-amd64.tar.gz" -o hcloud.tar.gz
          tar xzf hcloud.tar.gz
          sudo mv hcloud /usr/local/bin/
          rm hcloud.tar.gz

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # ── Pre-deploy config ────────────────────────────────────────
      - name: Write Codex auth file
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          if [ -n "$CODEX_AUTH_JSON" ]; then
            mkdir -p ~/.codex
            printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          fi

      - name: Generate staging openclaw.yml
        run: |
          cat > ansible/group_vars/openclaw.yml << 'YAML'
          ---
          # Staging deployment config (auto-generated by CI — do not edit)
          openclaw_model_primary: "anthropic/claude-haiku-4-5-20241022"
          openclaw_model_fallbacks: []
          openclaw_thinking_default: "off"
          openclaw_custom_models: {}

          openclaw_heartbeat_interval: "30m"
          openclaw_heartbeat_active_hours:
            start: "00:00"
            end: "24:00"

          openclaw_agents:
            - id: "main"
              is_default: true
              deliver_to: "{{ telegram_user_id | default('') }}"
              deliver_type: "dm"
              deliver_channel: "telegram"
            - id: "test"
              is_default: false
              deliver_to: "{{ telegram_test_user_id | default('') }}"
              deliver_type: "dm"
              deliver_channel: "telegram"

          openclaw_cron_jobs:
            - name: "main: Staging Test Cron"
              agent: "main"
              schedule: "0 0 30 2 *"
              message: "Staging test cron — this should never fire."
            - name: "test: Staging Test Cron"
              agent: "test"
              schedule: "0 0 30 2 *"
              message: "Staging test cron — this should never fire."

          # All MCP server types except node-exec
          openclaw_mcp_server_types:
            - type: "github"
              name_prefix: "github"
            - type: "codex"
              name_prefix: "codex"
            - type: "claude-code"
              name_prefix: "claude"
            - type: "pi"
              name_prefix: "pi"
            - type: "qmd"
              name_prefix: "qmd"

          obsidian_headless_enabled: true
          obsidian_headless_agents:
            - "main"

          node_exec_enabled: false
          YAML

      # ── Pulumi stack ─────────────────────────────────────────────
      - name: Initialize Pulumi staging stack
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
          CLAUDE_SETUP_TOKEN: ${{ secrets.CLAUDE_SETUP_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.STAGING_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GITHUB_TOKEN_PAT: ${{ secrets.STAGING_GITHUB_TOKEN }}
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_PASSWORD: ${{ secrets.OBSIDIAN_VAULT_PASSWORD }}
        run: |
          cd pulumi
          # Force-clean any stale stack from a previous interrupted run
          # (pending operations from cancelled deploys prevent clean re-use)
          pulumi stack rm staging --yes --force 2>/dev/null || true
          pulumi stack init staging

          # Server config
          pulumi config set serverName openclaw-staging
          pulumi config set serverType cx43
          pulumi config set tailscaleTags "tag:server"

          # Agent IDs (main is always present; "test" is the additional agent)
          pulumi config set agentIds "test"

          # Required secrets
          pulumi config set hcloud:token "$HCLOUD_TOKEN" --secret
          pulumi config set tailscaleAuthKey "$TS_AUTHKEY" --secret
          pulumi config set claudeSetupToken "$CLAUDE_SETUP_TOKEN" --secret

          # Telegram
          pulumi config set telegramBotToken "$TELEGRAM_BOT_TOKEN" --secret
          pulumi config set telegramUserId "$TELEGRAM_USER_ID"
          pulumi config set telegramTestUserId "$TELEGRAM_USER_ID"

          # Web search
          pulumi config set xaiApiKey "$XAI_API_KEY" --secret

          # GitHub MCP (same PAT for all agents)
          pulumi config set githubToken "$GITHUB_TOKEN_PAT" --secret
          pulumi config set githubTokenTest "$GITHUB_TOKEN_PAT" --secret

          # Workspaces
          pulumi config set workspaceRepoUrl "git@github.com:pandysp/openclaw-staging-workspace.git"
          pulumi config set workspaceTestRepoUrl "git@github.com:pandysp/openclaw-staging-workspace-test.git"

          # Obsidian
          pulumi config set obsidianAndyVaultRepoUrl "https://github.com/pandysp/openclaw-staging-vault.git"
          pulumi config set obsidianAuthToken "$OBSIDIAN_AUTH_TOKEN" --secret
          pulumi config set obsidianVaultPassword "$OBSIDIAN_VAULT_PASSWORD" --secret

      # ── Deploy ───────────────────────────────────────────────────
      - name: Deploy staging infrastructure
        shell: bash
        run: |
          set -o pipefail
          cd pulumi
          if pulumi up --yes --stack staging 2>&1 | tee /tmp/pulumi-up.log; then
            exit 0
          fi
          # Retry with fallback location on Hetzner capacity errors
          if grep -q 'resource_unavailable' /tmp/pulumi-up.log; then
            echo "::warning::Hetzner capacity unavailable at primary location, retrying with fsn1 (Falkenstein)"
            pulumi cancel --yes --stack staging 2>/dev/null || true
            pulumi refresh --yes --stack staging 2>/dev/null || true
            pulumi config set serverLocation fsn1 --stack staging
            # The retry may report stale "errored" resources from the first failed
            # attempt even when Ansible succeeded, so Pulumi's exit code is not
            # trustworthy here. But do NOT blindly swallow it — that previously hid a
            # real Ansible failure (failed=1) behind a green "deploy", which only
            # surfaced two steps later as a confusing workspace-sync error. Gate on
            # Ansible's own PLAY RECAP instead: any failed>0 or unreachable>0 is a real
            # provisioning failure and must fail the step; a non-zero Pulumi exit with a
            # clean recap is the tolerated stale-resource case.
            set +o pipefail
            # Truncate (not -a): the first attempt's log was only needed for the
            # resource_unavailable check above. Appending would let a stale
            # failed=N PLAY RECAP from that aborted attempt trip the gate below
            # even when this retry's recap is clean.
            pulumi up --yes --stack staging 2>&1 | tee /tmp/pulumi-up.log || true
            if grep -qE '(failed|unreachable)=[1-9][0-9]*' /tmp/pulumi-up.log; then
              echo "::error::Ansible reported task failures during provisioning (PLAY RECAP below)"
              grep -E 'PLAY RECAP|(failed|unreachable)=[1-9]|fatal:' /tmp/pulumi-up.log | tail -30
              exit 1
            fi
          else
            exit 1
          fi

      - name: Add deploy keys to GitHub repos
        run: |
          cd pulumi

          MAIN_KEY=$(pulumi stack output workspaceDeployPublicKey --stack staging)
          echo "$MAIN_KEY" | gh repo deploy-key add - \
            -R pandysp/openclaw-staging-workspace \
            -t "staging-$(date +%s)" -w

          TEST_KEY=$(pulumi stack output agentWorkspaceKeys --json --show-secrets --stack staging \
            | jq -r '."test".publicKey')
          echo "$TEST_KEY" | gh repo deploy-key add - \
            -R pandysp/openclaw-staging-workspace-test \
            -t "staging-$(date +%s)" -w

      - name: Trigger workspace git sync
        run: |
          HOST=$(tailscale status 2>/dev/null \
            | grep -E "openclaw-staging(-[0-9]+)?" \
            | grep -v "offline" \
            | grep -oE "openclaw-staging(-[0-9]+)?" \
            | head -1)
          TAILNET=$(tailscale status --json | jq -r '.MagicDNSSuffix')
          SSH="ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new ubuntu@${HOST}.${TAILNET}"
          # A freshly-written unit is invisible to the user manager until a
          # daemon-reload; the role notifies one, but reload before starting so
          # this trigger never races it. Then list what exists for diagnostics.
          $SSH "XDG_RUNTIME_DIR=/run/user/1000 systemctl --user daemon-reload"
          echo "Workspace sync units present on host:"
          $SSH "XDG_RUNTIME_DIR=/run/user/1000 systemctl --user list-unit-files 'workspace-git-sync-*' --no-legend --no-pager" || true
          # Kick each per-agent sync. This is an auxiliary trigger — the workspace
          # role already does the initial commit/push during deploy — so a missing
          # unit warns loudly but must not sink the phoenix (verify + smoke are the
          # real gates). A unit that exists but fails to start IS fatal.
          for agent in main test; do
            unit="workspace-git-sync-${agent}.service"
            if $SSH "XDG_RUNTIME_DIR=/run/user/1000 systemctl --user cat ${unit} >/dev/null 2>&1"; then
              $SSH "XDG_RUNTIME_DIR=/run/user/1000 systemctl --user start ${unit}"
            else
              echo "::warning::${unit} not present on host — skipping its sync trigger (workspace role may not have created it for this agent)"
            fi
          done

      # ── Verify ───────────────────────────────────────────────────
      - name: Run deployment verification
        run: OPENCLAW_HOSTNAME=openclaw-staging ./scripts/verify.sh

      - name: Run smoke test
        run: |
          HOST=$(tailscale status 2>/dev/null \
            | grep -E "openclaw-staging(-[0-9]+)?" \
            | grep -v "offline" \
            | grep -oE "openclaw-staging(-[0-9]+)?" \
            | head -1)
          TAILNET=$(tailscale status --json | jq -r '.MagicDNSSuffix')
          GATEWAY_TOKEN=$(cd pulumi && pulumi stack output openclawGatewayToken --show-secrets --stack staging)
          STAGING_HOST="${HOST}.${TAILNET}" GATEWAY_TOKEN="$GATEWAY_TOKEN" ./scripts/smoke-test.sh

      # ── Cleanup (always) ─────────────────────────────────────────
      - name: Remove deploy keys
        if: always()
        run: |
          for repo in pandysp/openclaw-staging-workspace pandysp/openclaw-staging-workspace-test; do
            gh api "repos/${repo}/keys" \
              --jq '.[] | select(.title | startswith("staging-")) | .id' 2>/dev/null \
            | while read -r id; do
              gh api -X DELETE "repos/${repo}/keys/${id}" 2>/dev/null || true
            done
          done

      - name: Destroy staging infrastructure
        if: always()
        run: |
          cd pulumi
          # Cancel any in-flight operations, then sync state with reality
          pulumi cancel --yes --stack staging 2>/dev/null || true
          pulumi refresh --yes --stack staging 2>/dev/null || true
          pulumi destroy --yes --stack staging 2>/dev/null || true
          pulumi stack rm staging --yes --force 2>/dev/null || true

      - name: Clean up orphaned Hetzner resources
        if: always()
        run: |
          # Delete any lingering staging servers
          hcloud server list -o noheader -o columns=id,name 2>/dev/null \
            | grep "openclaw-staging" | awk '{print $1}' \
            | while read -r id; do
              hcloud server delete "$id" || true
            done
          # Delete any lingering staging SSH keys
          hcloud ssh-key list -o noheader -o columns=id,name 2>/dev/null \
            | grep "openclaw-staging" | awk '{print $1}' \
            | while read -r id; do
              hcloud ssh-key delete "$id" || true
            done
          # Delete any lingering staging firewalls
          hcloud firewall list -o noheader -o columns=id,name 2>/dev/null \
            | grep "openclaw-staging" | awk '{print $1}' \
            | while read -r id; do
              hcloud firewall delete "$id" || true
            done
