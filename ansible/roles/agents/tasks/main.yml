---
- name: Get existing agents
  ansible.builtin.shell: |
    export XDG_RUNTIME_DIR=/run/user/1000
    openclaw agents list --json 2>/dev/null | sed -E '/^\[[A-Za-z][^]]*\]/d'
  args:
    executable: /bin/bash
  register: existing_agents
  changed_when: false

- block:
    - name: Write existing agents JSON to temp file
      ansible.builtin.copy:
        content: "{{ existing_agents.stdout }}"
        dest: /tmp/ansible_existing_agents.json
        mode: '0600'
      changed_when: false

    - name: Create non-default agents
      ansible.builtin.shell: |
        set -euo pipefail
        export XDG_RUNTIME_DIR=/run/user/1000
        if jq -e --arg id {{ item.id | quote }} '.[] | select(.id == $id)' /tmp/ansible_existing_agents.json > /dev/null 2>&1; then
            echo "Agent {{ item.id }} already exists"
        else
            openclaw agents add {{ item.id | quote }} --non-interactive --workspace "/home/ubuntu/.openclaw/workspace-{{ item.id }}"
        fi
      args:
        executable: /bin/bash
      loop: "{{ openclaw_agents | selectattr('is_default', 'equalto', false) | list }}"
      loop_control:
        label: "{{ item.id }}"
      register: agent_create
      changed_when: "'already exists' not in agent_create.stdout"
      notify: restart openclaw-gateway
  always:
    - name: Clean up existing agents temp file
      ansible.builtin.file:
        path: /tmp/ansible_existing_agents.json
        state: absent
      changed_when: false

- name: Refresh agent list for config targeting
  ansible.builtin.shell: |
    export XDG_RUNTIME_DIR=/run/user/1000
    openclaw agents list --json 2>/dev/null | sed -E '/^\[[A-Za-z][^]]*\]/d'
  args:
    executable: /bin/bash
  register: agents_current
  changed_when: false

# Default agent uses agents.defaults.* (implicit, not in agents.list)
- name: Set default agent heartbeat targeting
  ansible.builtin.shell: |
    set -euo pipefail
    export XDG_RUNTIME_DIR=/run/user/1000
    DESIRED='{"target":"{{ _default_agent.deliver_channel | default('telegram') }}","to":"{{ _default_agent.deliver_to }}","every":"{{ _default_agent.heartbeat_every | default(openclaw_heartbeat_interval) }}"{% if _default_agent.heartbeat_model is defined %},"model":"{{ _default_agent.heartbeat_model }}"{% endif %}}'
    CURRENT=$(openclaw config get "agents.defaults.heartbeat" 2>&1 | sed -E '/^\[[A-Za-z][^]]*\]/d') || {
        if echo "$CURRENT" | grep -qi "not set\|not found\|does not exist\|undefined"; then
            CURRENT="{}"
        else
            echo "ERROR reading heartbeat config for default agent: $CURRENT" >&2
            exit 1
        fi
    }
    D_NORM=$(echo "$DESIRED" | jq -cS '.')
    C_FILTERED=$(echo "$CURRENT" | jq -cS --argjson d "$DESIRED" 'with_entries(select(.key | IN($d | keys[])))' 2>/dev/null || echo "PARSE_FAIL")
    if [ "$C_FILTERED" = "$D_NORM" ]; then
        echo "OK"
    else
        openclaw config set "agents.defaults.heartbeat" --json "$DESIRED"
        echo "UPDATED: default agent heartbeat → {{ _default_agent.deliver_channel | default('telegram') }}:{{ _default_agent.deliver_to }}"
    fi
  args:
    executable: /bin/bash
  vars:
    _default_agent: "{{ openclaw_agents | selectattr('is_default', 'equalto', true) | first }}"
  when: (_default_agent.deliver_to | default('')) != ''
  register: default_heartbeat_result
  changed_when: "'UPDATED' in (default_heartbeat_result.stdout | default(''))"
  notify: restart openclaw-gateway

- name: Set default agent sandbox mode
  ansible.builtin.shell: |
    set -euo pipefail
    export XDG_RUNTIME_DIR=/run/user/1000
    CURRENT=$(openclaw config get "agents.defaults.sandbox.mode" 2>/dev/null | sed -E '/^\[[A-Za-z][^]]*\]/d') || CURRENT=""
    DESIRED="{{ _default_agent.sandbox_mode }}"
    if [ "$CURRENT" = "$DESIRED" ]; then
        echo "OK"
    else
        openclaw config set "agents.defaults.sandbox.mode" "$DESIRED"
        echo "UPDATED: default agent sandbox.mode → {{ _default_agent.sandbox_mode }}"
    fi
  args:
    executable: /bin/bash
  vars:
    _default_agent: "{{ openclaw_agents | selectattr('is_default', 'equalto', true) | first }}"
  when: _default_agent.sandbox_mode is defined
  register: default_sandbox_result
  changed_when: "'UPDATED' in (default_sandbox_result.stdout | default(''))"
  notify: restart openclaw-gateway

# Non-default agents use agents.list.N.* (explicit entries)
- block:
    - name: Write current agents JSON to temp file
      ansible.builtin.copy:
        content: "{{ agents_current.stdout }}"
        dest: /tmp/ansible_agents_current.json
        mode: '0600'
      changed_when: false

    - name: Set non-default agent heartbeat targeting
      ansible.builtin.shell: |
        set -euo pipefail
        export XDG_RUNTIME_DIR=/run/user/1000
        AGENT_INDEX=$(jq -r --arg id {{ item.id | quote }} 'to_entries[] | select(.value.id == $id) | .key' /tmp/ansible_agents_current.json)
        if [ -z "$AGENT_INDEX" ]; then
            echo "ERROR: Agent {{ item.id | quote }} not found in agents list after creation step" >&2
            cat /tmp/ansible_agents_current.json >&2
            exit 1
        fi
        DESIRED='{"target":"{{ item.deliver_channel | default('telegram') }}","to":"{{ item.deliver_to }}","every":"{{ item.heartbeat_every | default(openclaw_heartbeat_interval) }}"{% if item.heartbeat_model is defined %},"model":"{{ item.heartbeat_model }}"{% endif %}}'
        CURRENT=$(openclaw config get "agents.list.${AGENT_INDEX}.heartbeat" 2>&1 | sed -E '/^\[[A-Za-z][^]]*\]/d') || {
            if echo "$CURRENT" | grep -qi "not set\|not found\|does not exist\|undefined"; then
                CURRENT="{}"
            else
                echo "ERROR reading heartbeat config for {{ item.id }}: $CURRENT" >&2
                exit 1
            fi
        }
        # Compare only the fields we set — gateway may enrich with extra fields (e.g. model)
        D_NORM=$(echo "$DESIRED" | jq -cS '.')
        C_FILTERED=$(echo "$CURRENT" | jq -cS --argjson d "$DESIRED" 'with_entries(select(.key | IN($d | keys[])))' 2>/dev/null || echo "PARSE_FAIL")
        if [ "$C_FILTERED" = "$D_NORM" ]; then
            echo "OK"
        else
            openclaw config set "agents.list.${AGENT_INDEX}.heartbeat" --json "$DESIRED"
            echo "UPDATED: {{ item.id }} heartbeat → {{ item.deliver_channel | default('telegram') }}:{{ item.deliver_to }}"
        fi
      args:
        executable: /bin/bash
      loop: "{{ openclaw_agents | selectattr('is_default', 'equalto', false) | selectattr('deliver_to', 'ne', '') | list }}"
      loop_control:
        label: "{{ item.id }} → {{ item.deliver_to }}"
      register: heartbeat_result
      changed_when: "'UPDATED' in heartbeat_result.stdout"
      notify: restart openclaw-gateway

    - name: Set non-default agent sandbox mode override
      ansible.builtin.shell: |
        set -euo pipefail
        export XDG_RUNTIME_DIR=/run/user/1000
        AGENT_INDEX=$(jq -r --arg id {{ item.id | quote }} 'to_entries[] | select(.value.id == $id) | .key' /tmp/ansible_agents_current.json)
        if [ -z "$AGENT_INDEX" ]; then
            echo "ERROR: Agent {{ item.id | quote }} not found in agents list" >&2
            exit 1
        fi
        CURRENT=$(openclaw config get "agents.list.${AGENT_INDEX}.sandbox.mode" 2>/dev/null | sed -E '/^\[[A-Za-z][^]]*\]/d') || CURRENT=""
        DESIRED="{{ item.sandbox_mode }}"
        if [ "$CURRENT" = "$DESIRED" ]; then
            echo "OK"
        else
            openclaw config set "agents.list.${AGENT_INDEX}.sandbox.mode" "$DESIRED"
            echo "UPDATED: {{ item.id }} sandbox.mode → {{ item.sandbox_mode }}"
        fi
      args:
        executable: /bin/bash
      loop: "{{ openclaw_agents | selectattr('is_default', 'equalto', false) | selectattr('sandbox_mode', 'defined') | list }}"
      loop_control:
        label: "{{ item.id }} → {{ item.sandbox_mode }}"
      register: sandbox_result
      changed_when: "'UPDATED' in sandbox_result.stdout"
      notify: restart openclaw-gateway

  always:
    - name: Clean up current agents temp file
      ansible.builtin.file:
        path: /tmp/ansible_agents_current.json
        state: absent
      changed_when: false
