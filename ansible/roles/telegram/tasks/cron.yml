---
- name: Flush handlers (ensure gateway is restarted before cron operations)
  ansible.builtin.meta: flush_handlers

- name: Wait for gateway to stabilize after restart
  ansible.builtin.shell: |
    set -euo pipefail
    export XDG_RUNTIME_DIR=/run/user/1000
    GW_TOKEN=$(python3 -c "import json; print(json.load(open('/home/ubuntu/.openclaw/openclaw.json'))['gateway']['auth']['token'])")
    GW_URL="{{ _tailscale_wss_url }}"

    # Wait for health first (basic process check via HTTP — always works)
    for i in $(seq 1 12); do
        if openclaw health >/dev/null 2>&1; then break; fi
        sleep 5
    done

    # Verify we have a Tailscale WSS URL
    if [ -z "$GW_URL" ]; then
        echo "ERROR: Tailscale WSS URL not available — cannot route CLI commands" >&2
        echo "Ensure config role has run (sets gateway.tailscale.mode=serve)" >&2
        exit 1
    fi

    # Wait for WebSocket connectivity through Tailscale Serve
    # Routes via wss:// to bypass OpenClaw 2026.3.13 local loopback handshake bug
    # See: https://github.com/openclaw/openclaw/issues/48167
    for i in $(seq 1 24); do
        if openclaw cron list --json --url "$GW_URL" --token "$GW_TOKEN" >/dev/null 2>&1; then
            echo "Gateway is healthy and accepting WebSocket connections via Tailscale Serve"
            exit 0
        fi
        sleep 10
    done
    echo "WARNING: Gateway did not become fully ready within 5 minutes" >&2
    echo "Re-run: ./scripts/provision.sh --tags telegram" >&2
    exit 1
  args:
    executable: /bin/bash
  register: gateway_health
  changed_when: false
  failed_when: false
  no_log: true

- name: Auto-pair VPS CLI if gateway health check failed
  when: gateway_health.rc != 0
  block:
    - name: Trigger pairing request via health check
      ansible.builtin.shell: |
        export XDG_RUNTIME_DIR=/run/user/1000
        openclaw health || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Wait for pairing request to register
      ansible.builtin.pause:
        seconds: 3

    - name: Read gateway token and find pending pairing request
      ansible.builtin.shell: |
        set -euo pipefail
        export XDG_RUNTIME_DIR=/run/user/1000

        # Read the gateway token from config
        GW_TOKEN=$(python3 -c "import json; print(json.load(open('/home/ubuntu/.openclaw/openclaw.json'))['gateway']['auth']['token'])")

        # Use OPENCLAW_GATEWAY_TOKEN env var (not --url/--token WSS) because
        # device pairing operations must work BEFORE the CLI is paired. The WSS
        # route requires pairing (chicken-and-egg); OPENCLAW_GATEWAY_TOKEN
        # injects the token at the SDK level, bypassing the WebSocket pairing
        # handshake. (2026.6.1 renamed this from OPENCLAW_TOKEN, which is now
        # ignored — the old name made approve run unauthenticated and no-op.)
        DEVICES_OUT=$(OPENCLAW_GATEWAY_TOKEN="$GW_TOKEN" openclaw devices list 2>&1) || {
            echo "SKIP: devices list failed: $DEVICES_OUT" >&2
            exit 1
        }

        # UUID-with-dashes regex matches request IDs (not paired device hex IDs)
        REQUEST_ID=$(echo "$DEVICES_OUT" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1) || REQUEST_ID=""

        if [ -z "$REQUEST_ID" ]; then
            echo "SKIP: no pending pairing request found"
            exit 1
        fi

        # Approve via OPENCLAW_GATEWAY_TOKEN (same reason as above)
        OPENCLAW_GATEWAY_TOKEN="$GW_TOKEN" openclaw devices approve "$REQUEST_ID"
        echo "PAIRED: approved request $REQUEST_ID"
      args:
        executable: /bin/bash
      no_log: true
      register: auto_pair_result
      changed_when: "'PAIRED' in auto_pair_result.stdout"
      failed_when: false

    - name: Re-check gateway health after pairing
      ansible.builtin.shell: |
        export XDG_RUNTIME_DIR=/run/user/1000
        for i in $(seq 1 6); do
            if openclaw health >/dev/null 2>&1; then
                echo "Gateway is healthy after auto-pairing"
                exit 0
            fi
            sleep 5
        done
        echo "WARNING: Gateway still not healthy after auto-pairing" >&2
        exit 1
      args:
        executable: /bin/bash
      register: gateway_health_retry
      changed_when: false
      failed_when: false

    - name: Update gateway_health fact after auto-pairing
      ansible.builtin.set_fact:
        gateway_health: "{{ gateway_health_retry }}"
      when: gateway_health_retry.rc is defined

- name: Skip cron setup if gateway is not healthy
  when: gateway_health.rc != 0
  block:
    - name: Warn about skipped cron setup
      ansible.builtin.debug:
        msg: >-
          Skipping cron job setup — gateway health check failed.
          This is expected on first install (device pairing may be pending).
          After approving devices, re-run: ./scripts/provision.sh --tags telegram
          See CLAUDE.md "First-Time Access" for pairing instructions.

    - name: Flag cron setup as skipped for provision.sh
      delegate_to: localhost
      ansible.builtin.copy:
        content: "cron_setup_skipped"
        dest: /tmp/ansible-cron-skipped
        mode: "0600"
      changed_when: false

- name: Read gateway token for cron operations
  ansible.builtin.shell: |
    python3 -c "import json; print(json.load(open('/home/ubuntu/.openclaw/openclaw.json'))['gateway']['auth']['token'])"
  args:
    executable: /bin/bash
  register: _gw_token
  changed_when: false
  no_log: true
  when: gateway_health.rc == 0

- name: Get existing cron jobs
  ansible.builtin.shell: |
    export XDG_RUNTIME_DIR=/run/user/1000
    openclaw cron list --json --url "{{ _tailscale_wss_url }}" --token "{{ _gw_token.stdout }}" 2>/dev/null | sed -E '/^\[[A-Za-z][^]]*\]/d'
  args:
    executable: /bin/bash
  register: existing_cron
  changed_when: false
  no_log: true
  when: gateway_health.rc == 0

# All remaining cron tasks require a healthy gateway
- name: Configure cron jobs
  when: gateway_health.rc == 0
  block:
    # Write cron JSON to a temp file to avoid shell quoting issues.
    # Cron messages can contain single quotes and parentheses that break
    # inline echo '{{ ... }}' in bash.
    - name: Write cron list to temp file
      ansible.builtin.copy:
        content: "{{ existing_cron.stdout }}"
        dest: /tmp/ansible-cron-list.json
        mode: "0600"
      changed_when: false

    - name: Remove legacy cron jobs by name
      ansible.builtin.shell: |
        set -euo pipefail
        export XDG_RUNTIME_DIR=/run/user/1000
        IDS=$(jq -r --arg n "{{ item }}" '.jobs[] | select(.name == $n) | .id' /tmp/ansible-cron-list.json)
        for id in $IDS; do
          output=$(openclaw cron remove "$id" --url "{{ _tailscale_wss_url }}" --token "{{ _gw_token.stdout }}" 2>&1) || {
              if echo "$output" | grep -qi "not found\|does not exist"; then
                  true
              else
                  echo "ERROR: Failed to remove legacy cron job $id: $output" >&2
                  exit 1
              fi
          }
        done
      args:
        executable: /bin/bash
      loop: "{{ openclaw_legacy_cron_names | default([]) }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false

    # Build deliver_to and deliver_channel lookup maps from openclaw_agents
    - name: Build agent delivery map
      ansible.builtin.set_fact:
        agent_deliver_map: >-
          {{ dict(openclaw_agents | map(attribute='id') | zip(openclaw_agents | map(attribute='deliver_to'))) }}
        agent_channel_map: >-
          {{ dict(openclaw_agents | map(attribute='id') | zip(openclaw_agents | map(attribute='deliver_channel', default='telegram'))) }}

    - name: Validate cron job agent IDs exist in openclaw_agents
      ansible.builtin.assert:
        that:
          - item.agent in (openclaw_agents | map(attribute='id') | list)
        fail_msg: >-
          Cron job '{{ item.name }}' references unknown agent '{{ item.agent }}'.
          Known agents: {{ openclaw_agents | map(attribute='id') | list }}.
          Check for typos in openclaw_cron_jobs.
      loop: "{{ openclaw_cron_jobs }}"
      loop_control:
        label: "{{ item.name }} (agent={{ item.agent }})"

    - name: Filter cron jobs to agents with delivery targets
      ansible.builtin.set_fact:
        active_cron_jobs: >-
          {{ openclaw_cron_jobs | selectattr('agent', 'in',
             agent_deliver_map | dict2items | selectattr('value', 'ne', '') | map(attribute='key') | list) | list }}

    - name: Show skipped cron jobs (agents without deliver_to)
      ansible.builtin.debug:
        msg: "Skipping {{ item.name }} — agent '{{ item.agent }}' has no deliver_to configured"
      loop: "{{ openclaw_cron_jobs | difference(active_cron_jobs) }}"
      loop_control:
        label: "{{ item.name }}"
      when: (openclaw_cron_jobs | difference(active_cron_jobs)) | length > 0

    - name: Write cron message temp files
      ansible.builtin.copy:
        content: "{{ item.message }}"
        dest: "/tmp/ansible-cron-msg-{{ item.name | hash('md5') }}"
        mode: "0600"
      loop: "{{ active_cron_jobs }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false

    # All-or-nothing cron comparison: build normalized desired vs existing,
    # only delete+recreate if they differ.
    - name: Sync cron jobs with temp file cleanup
      block:
        - name: Compare and sync cron jobs
          ansible.builtin.shell: |
            set -euo pipefail
            export XDG_RUNTIME_DIR=/run/user/1000
            GW_URL="{{ _tailscale_wss_url }}"
            GW_TOKEN="{{ _gw_token.stdout }}"

            # The gateway is restarted immediately before this task (handlers are
            # flushed) and on a fresh box its WS endpoint can be briefly unready,
            # so retry transient cron CLI failures instead of aborting the whole
            # provision on the first hiccup.
            #
            # A fresh gateway also requires the CLI device to be paired before WSS
            # ops (cron add/remove/list) succeed; it returns a pairing-required
            # error carrying a request id. Retrying alone never clears that, so on
            # such an error we approve the pending request via
            # OPENCLAW_GATEWAY_TOKEN (SDK-level token injection that bypasses the
            # WSS pairing handshake, same as the auto-pair block above) and retry.
            #
            # On final failure, persist the error with the gateway token redacted
            # so it stays diagnosable despite the no_log on this task.
            CRON_ERR_FILE=/tmp/ansible-cron-error.txt
            : > "$CRON_ERR_FILE"
            retry_cron() {
                local n=0 max=6 out rid
                while :; do
                    if out=$("$@" 2>&1); then printf '%s' "$out"; return 0; fi
                    if printf '%s' "$out" | grep -qiE "pairing required|not approved"; then
                        rid=$(printf '%s' "$out" | grep -oE "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}" | head -1)
                        if [ -n "$rid" ]; then
                            OPENCLAW_GATEWAY_TOKEN="$GW_TOKEN" openclaw devices approve "$rid" >/dev/null 2>&1 || true
                        else
                            OPENCLAW_GATEWAY_TOKEN="$GW_TOKEN" openclaw devices list >/dev/null 2>&1 || true
                        fi
                    fi
                    n=$((n + 1))
                    if [ "$n" -ge "$max" ]; then
                        printf '%s\n' "${out//$GW_TOKEN/<REDACTED_TOKEN>}" >> "$CRON_ERR_FILE"
                        return 1
                    fi
                    sleep $((n * 3))
                done
            }

            # Build desired cron jobs as sorted JSON array (comparable fields only)
            DESIRED=$(jq -n '[]')
            {% for job in active_cron_jobs %}
            MSG=$(cat "/tmp/ansible-cron-msg-{{ job.name | hash('md5') }}" | tr -d '\n')
            DESIRED=$(echo "$DESIRED" | jq --arg name "{{ job.name }}" \
                --arg agent "{{ job.agent }}" \
                --arg schedule "{{ job.schedule }}" \
                --arg tz "{{ openclaw_timezone }}" \
                --arg message "$MSG" \
                --arg delivery_to "{{ agent_deliver_map[job.agent] }}" \
                --arg delivery_channel "{{ agent_channel_map[job.agent] | default('telegram') }}" \
                '. + [{name: $name, agentId: $agent, schedule: $schedule, tz: $tz, message: $message, delivery_channel: $delivery_channel, delivery_to: $delivery_to}]')
            {% endfor %}
            DESIRED=$(echo "$DESIRED" | jq -cS 'sort_by(.name)')

            # Extract comparable fields from existing cron jobs (filter to Ansible-managed names only)
            EXISTING=$(jq '[.jobs[] | {name, agentId, schedule: .schedule.expr, tz: .schedule.tz, message: (.payload.message | gsub("\\n$"; "")), delivery_channel: .delivery.channel, delivery_to: .delivery.to}]' /tmp/ansible-cron-list.json)

            # Filter existing to only Ansible-managed job names
            EXISTING_FILTERED=$(echo "$EXISTING" | jq -cS --argjson desired "$DESIRED" \
                '[.[] | select(.name as $n | $desired | map(.name) | index($n))] | sort_by(.name)')

            if [ "$DESIRED" = "$EXISTING_FILTERED" ]; then
                echo "OK"
            else
                echo "Cron jobs differ — recreating all managed jobs"

                # Delete existing managed jobs (throttled to avoid overwhelming gateway)
                {% for job in active_cron_jobs %}
                IDS=$(jq -r --arg n "{{ job.name }}" '.jobs[] | select(.name == $n) | .id' /tmp/ansible-cron-list.json)
                for id in $IDS; do
                    output=$(openclaw cron remove "$id" --url "$GW_URL" --token "$GW_TOKEN" 2>&1) || {
                        echo "$output" | grep -qi "not found\|does not exist" || { echo "ERROR: $output" >&2; exit 1; }
                    }
                    sleep 1
                done
                {% endfor %}

                # Recreate all managed jobs (throttled to avoid overwhelming gateway)
                {% for job in active_cron_jobs %}
                MSG=$(cat "/tmp/ansible-cron-msg-{{ job.name | hash('md5') }}")
                retry_cron openclaw cron add \
                    --name "{{ job.name }}" \
                    --cron "{{ job.schedule }}" \
                    --tz "{{ openclaw_timezone }}" \
                    --session isolated \
                    --agent "{{ job.agent }}" \
                    --message "$MSG" \
                    --deliver --channel {{ agent_channel_map[job.agent] | default('telegram') }} --to "{{ agent_deliver_map[job.agent] }}" \
                    --url "$GW_URL" --token "$GW_TOKEN" \
                    || { echo "ERROR: cron add failed for {{ job.name }} after retries" >&2; exit 1; }
                sleep 1
                {% endfor %}

                echo "UPDATED"
            fi
          args:
            executable: /bin/bash
          register: cron_sync_result
          changed_when: "'UPDATED' in cron_sync_result.stdout"
          no_log: true
      rescue:
        # The sync task is no_log (it embeds the gateway token), so its failure
        # is censored. Surface the token-redacted error file the retry wrapper
        # wrote, then re-fail. Safe to display: the token is already redacted.
        - name: Read redacted cron error
          ansible.builtin.command: cat /tmp/ansible-cron-error.txt
          register: cron_err_redacted
          changed_when: false
          failed_when: false
        - name: Show redacted cron error
          ansible.builtin.debug:
            msg: "{{ cron_err_redacted.stdout_lines | default(['(no captured error — failure was outside the cron CLI calls)']) }}"
        - name: Re-fail after surfacing cron error
          ansible.builtin.fail:
            msg: "cron sync failed; see redacted gateway error above"
      always:
        - name: Clean up cron temp files
          ansible.builtin.shell: rm -f /tmp/ansible-cron-list.json /tmp/ansible-cron-msg-* /tmp/ansible-cron-error.txt
          args:
            executable: /bin/bash
          changed_when: false

    - name: Verify cron job count
      ansible.builtin.shell: |
        export XDG_RUNTIME_DIR=/run/user/1000
        for attempt in 1 2 3; do
            RESULT=$(openclaw cron list --json --url "{{ _tailscale_wss_url }}" --token "{{ _gw_token.stdout }}" 2>/dev/null | sed -E '/^\[[A-Za-z][^]]*\]/d')
            [ -n "$RESULT" ] && break
            sleep 5
        done
        echo "$RESULT"
      args:
        executable: /bin/bash
      register: final_cron
      changed_when: false
      check_mode: false
      no_log: true
      failed_when: false

    - name: Warn if cron verification failed
      ansible.builtin.debug:
        msg: "WARNING: cron list verification returned empty — gateway CLI connection flaky. Cron sync task succeeded, jobs are likely correct."
      when: final_cron.stdout | default('') | length == 0

    - name: Assert expected cron jobs are present
      ansible.builtin.assert:
        that:
          - (final_cron.stdout | from_json).jobs | length >= active_cron_jobs | length
          - (active_cron_jobs | map(attribute='name') | sort | list) | difference((final_cron.stdout | from_json).jobs | map(attribute='name') | list) | length == 0
        fail_msg: >-
          Missing Ansible-managed cron jobs.
          Expected: {{ active_cron_jobs | map(attribute='name') | sort | list }}.
          Missing: {{ (active_cron_jobs | map(attribute='name') | list) | difference((final_cron.stdout | from_json).jobs | map(attribute='name') | list) }}.
          Server has {{ (final_cron.stdout | from_json).jobs | length }} total (including manually added).
      when: final_cron.stdout | default('') | length > 0
