---
# Configure Discord channel settings.
# Follows the telegram channel.yml pattern: JSON-normalized policy config.
# Key differences from Telegram:
#   - Uses channels.discord.token (not botToken) — Discord schema field name
#   - Uses channels.discord.enabled (built-in channel like Telegram, not a plugin like WhatsApp)
#   - Guild config at channels.discord.guilds.<guildId> — uses "users" array (Discord schema,
#     not "allowFrom" like Telegram/WhatsApp)
#   - requireMention: false (private server; set true for public servers)
#   - User IDs are strings (Discord snowflake IDs are 64-bit — never cast to int)
#
# NOTE: channels.discord.token is injected in playbook.yml post_tasks via direct
# JSON write, not here. openclaw config set strips nested sensitive-only objects
# on subsequent writes (see openclaw issue 6070).

- name: Configure Discord channel settings
  ansible.builtin.shell: |
    set -euo pipefail
    export XDG_RUNTIME_DIR=/run/user/1000
    CHANGED=""

    ENABLED=$(openclaw config get channels.discord.enabled 2>/dev/null | sed '/^\[mcp-adapter\]/d; /^\[plugins\]/d') || ENABLED=""
    if [ "$ENABLED" != "true" ]; then
        openclaw config set channels.discord.enabled true
        CHANGED="yes"
    fi

    # Guild config
    {% if discord_guild_id is defined and discord_guild_id | length > 0 %}
    # Group policy: allowlist
    CURRENT_GP=$(openclaw config get channels.discord.groupPolicy 2>/dev/null | sed '/^\[mcp-adapter\]/d; /^\[plugins\]/d') || CURRENT_GP=""
    if [ "$CURRENT_GP" != "allowlist" ]; then
        openclaw config set channels.discord.groupPolicy "allowlist"
        CHANGED="yes"
    fi

    # Guild config: set entire guilds object (nested guild ID keys not supported)
    {% set guild_entry = {} %}
    {% if discord_user_id is defined and discord_user_id | length > 0 %}
    {%   set guild_entry = {"users": [discord_user_id], "requireMention": false} %}
    {% else %}
    {%   set guild_entry = {"requireMention": false} %}
    {% endif %}
    {% set guilds_obj = {discord_guild_id: guild_entry} %}
    DESIRED_GUILDS='{{ guilds_obj | to_json }}'
    CURRENT_GUILDS=$(openclaw config get channels.discord.guilds 2>/dev/null | sed '/^\[mcp-adapter\]/d; /^\[plugins\]/d') || CURRENT_GUILDS="{}"
    CG_NORM=$(echo "$CURRENT_GUILDS" | jq -cS '.' 2>/dev/null || echo "PARSE_FAIL")
    DG_NORM=$(echo "$DESIRED_GUILDS" | jq -cS '.' 2>/dev/null || echo "PARSE_FAIL")
    if [ "$CG_NORM" = "PARSE_FAIL" ] || [ "$DG_NORM" = "PARSE_FAIL" ] || [ "$CG_NORM" != "$DG_NORM" ]; then
        openclaw config set channels.discord.guilds --json "$DESIRED_GUILDS"
        CHANGED="yes"
    fi
    {% else %}
    echo "WARNING: discord_guild_id is not set. Bot will accept messages from ALL guilds it's in." >&2
    echo "  Set guild ID: pulumi config set discordGuildId YOUR_GUILD_ID" >&2
    {% endif %}

    if [ -n "$CHANGED" ]; then echo "UPDATED"; else echo "OK"; fi
  args:
    executable: /bin/bash
  register: discord_config_result
  changed_when: "'UPDATED' in discord_config_result.stdout"
  notify: restart openclaw-gateway
