[defaults]
inventory = inventory/pulumi_inventory.py
remote_tmp = /tmp/.ansible-${USER}/tmp
pipelining = True
host_key_checking = False
interpreter_python = auto_silent
retry_files_enabled = False
# ansible.posix 2.1.0 imports from deprecated ansible.module_utils._text
# (fix pending: https://github.com/ansible-collections/ansible.posix/pull/690)
# Remove this once ansible.posix ships the fix (likely 2.2.0+)
deprecation_warnings = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=30s -o ControlPath=/tmp/ansible-ssh-%h-%p-%r

[privilege_escalation]
become = False
