---
# Bootstrap play: pre-create remote tmp dirs so become tasks don't warn.
# raw bypasses the module subsystem — no tmp dir needed to run it.
- name: Bootstrap Ansible remote directories
  hosts: openclaw
  gather_facts: false
  tags: [always]
  tasks:
    - name: Wait for SSH connectivity
      wait_for_connection:
        timeout: 300
        delay: 10

    - name: Pre-create remote tmp directories
      ansible.builtin.raw: mkdir -p /tmp/.ansible-root/tmp && chmod 0700 /tmp/.ansible-root/tmp
      become: true
      changed_when: false

- name: Provision OpenClaw gateway
  hosts: openclaw
  gather_facts: true

  pre_tasks:

    # --- Derived config: auto-generate from openclaw_agents × openclaw_mcp_server_types ---
    # These computed variables (_openclaw_*) replace the manual per-agent lists that were
    # previously in all.yml. Override by defining openclaw_mcp_servers or openclaw_workspaces
    # in openclaw.yml.

    # MCP servers: agents × server_types cross-product
    - name: Use manually defined MCP servers (override)
      ansible.builtin.set_fact:
        _openclaw_mcp_servers: "{{ openclaw_mcp_servers }}"
      when: openclaw_mcp_servers is defined
      tags: [always]

    - name: Initialize auto-generated MCP server list
      ansible.builtin.set_fact:
        _openclaw_mcp_servers: []
      when: openclaw_mcp_servers is not defined
      tags: [always]

    - name: Auto-generate MCP servers from server types × agents
      ansible.builtin.set_fact:
        _openclaw_mcp_servers: "{{ _openclaw_mcp_servers + [_entry] }}"
      vars:
        _name: "{{ item.0.name_prefix if item.1.id == 'main' else item.0.name_prefix ~ '-' ~ item.1.id }}"
        _cwd: "{{ '/home/ubuntu/.openclaw/workspace' if item.1.id == 'main' else '/home/ubuntu/.openclaw/workspace-' ~ item.1.id }}"
        _token_var: "{{ 'github_token' if item.1.id == 'main' else 'github_token_' ~ item.1.id }}"
        _entry: >-
          {{ {'name': _name, 'type': item.0.type, 'agent_id': item.1.id}
             | combine({'cwd': _cwd} if item.0.type in ['codex', 'claude-code', 'pi', 'qmd'] else {})
             | combine({'token_var': _token_var} if item.0.type == 'github' else {}) }}
      loop: "{{ openclaw_mcp_server_types | product(openclaw_agents) | list }}"
      loop_control:
        label: "{{ _name }}"
      when: openclaw_mcp_servers is not defined
      tags: [always]

    # Workspaces: one per agent with mechanical naming
    - name: Use manually defined workspaces (override)
      ansible.builtin.set_fact:
        _openclaw_workspaces: "{{ openclaw_workspaces }}"
      when: openclaw_workspaces is defined
      tags: [always]

    - name: Auto-generate workspaces from agents
      ansible.builtin.set_fact:
        _openclaw_workspaces: "{{ (_openclaw_workspaces | default([])) + [_entry] }}"
      vars:
        _repo_var: "{{ 'workspace_repo_url' if item.id == 'main' else 'workspace_' ~ item.id ~ '_repo_url' }}"
        _key_var: "{{ 'workspace_deploy_key' if item.id == 'main' else 'workspace_' ~ item.id ~ '_deploy_key' }}"
        _entry:
          agent_id: "{{ item.id }}"
          repo_url: "{{ lookup('vars', _repo_var, default='') }}"
          deploy_key: "{{ lookup('vars', _key_var, default='') }}"
          workspace_dir: "{{ '/home/ubuntu/.openclaw/workspace' if item.id == 'main' else '/home/ubuntu/.openclaw/workspace-' ~ item.id }}"
          ssh_alias: "github-workspace-{{ item.id }}"
          key_file: "{{ 'workspace-deploy-key' if item.id == 'main' else 'workspace-deploy-key-' ~ item.id }}"
      loop: "{{ openclaw_agents }}"
      loop_control:
        label: "{{ item.id }}"
      when: openclaw_workspaces is not defined
      tags: [always]

    - name: Initialize qmd_workspaces list
      ansible.builtin.set_fact:
        qmd_workspaces: []
      tags: [always]

    - name: Derive qmd_workspaces (agents with workspace repos + assigned HTTP port + server name)
      ansible.builtin.set_fact:
        qmd_workspaces: >-
          {{ qmd_workspaces + [item | combine({
               'port': qmd_http_base_port | int + _idx,
               'server_name': 'qmd' if item.agent_id == 'main' else 'qmd-' ~ item.agent_id
             })] }}
      loop: "{{ _openclaw_workspaces | selectattr('repo_url', 'ne', '') | list }}"
      loop_control:
        index_var: _idx
        label: "{{ item.agent_id }}"
      tags: [always]

    # Docker bridge gateway IP — needed by ufw, openclaw, config, and workspace roles.
    # On day-2 runs (Docker already installed), pre_tasks resolves it immediately.
    # On fresh servers, Docker isn't installed yet — the docker role resolves it after install.
    - name: Get Docker bridge gateway IP
      ansible.builtin.shell: |
        docker network inspect bridge --format '{{ '{{' }}(index .IPAM.Config 0).Gateway{{ '}}' }}'
      args:
        executable: /bin/bash
      register: docker_bridge_result
      changed_when: false
      failed_when: false
      tags: [always]

    - name: Set Docker bridge gateway IP fact
      ansible.builtin.set_fact:
        beads_docker_bridge_gateway_ip: "{{ docker_bridge_result.stdout | default('') | trim }}"
      tags: [always]

    # Tailscale WSS URL: used by telegram and post_tasks to route CLI commands through
    # Tailscale Serve instead of local loopback (broken in OpenClaw 2026.3.13).
    # See: https://github.com/openclaw/openclaw/issues/48167
    - name: Resolve Tailscale WSS URL for CLI commands
      ansible.builtin.shell: |
        FQDN=$(tailscale status --self --json 2>/dev/null | grep -o '"DNSName": *"[^"]*"' | head -1 | sed 's/.*: *"//; s/"//; s/\.$//')
        if [ -n "$FQDN" ] && [ "$FQDN" != "null" ]; then
          echo "wss://$FQDN"
        fi
      args:
        executable: /bin/bash
      register: _tailscale_wss_result
      changed_when: false
      failed_when: false
      tags: [always]

    - name: Set Tailscale WSS URL fact
      ansible.builtin.set_fact:
        _tailscale_wss_url: "{{ _tailscale_wss_result.stdout | default('') | trim }}"
      tags: [always]

  roles:
    - { role: system,    tags: [system],    become: true }
    - { role: docker,    tags: [docker],    become: true }
    - { role: ufw,       tags: [ufw],       become: true }
    - { role: openclaw,  tags: [openclaw] }
    - { role: config,    tags: [config] }
    - role: agents
      tags: [agents]
      when: >-
        (telegram_bot_token is defined and telegram_bot_token | length > 0) or
        (openclaw_agents | selectattr('deliver_channel', 'defined')
          | selectattr('deliver_channel', 'equalto', 'whatsapp') | list | length > 0) or
        (discord_bot_token is defined and discord_bot_token | length > 0)
    # telegram must run immediately after agents — if sandbox runs in between,
    # agents exist without bindings and incoming messages get misrouted.
    - { role: telegram,  tags: [telegram],  when: telegram_bot_token is defined and telegram_bot_token | length > 0 }
    # whatsapp after telegram — configures WhatsApp channel for agents using deliver_channel: whatsapp.
    - role: whatsapp
      tags: [whatsapp]
      when: >-
        openclaw_agents | selectattr('deliver_channel', 'defined')
          | selectattr('deliver_channel', 'equalto', 'whatsapp') | list | length > 0
    # discord after whatsapp — configures Discord channel (bot token, guild allowlist).
    - { role: discord, tags: [discord], when: discord_bot_token is defined and discord_bot_token | length > 0 }
    # obsidian-headless syncs workspaces to Obsidian Sync cloud for phone access.
    - role: obsidian-headless
      tags: [obsidian-headless]
      when: obsidian_headless_enabled | default(false) | bool
    # qmd after obsidian-headless — needs workspace dirs from agents role, before plugins registers MCP servers.
    - { role: qmd,       tags: [qmd],       when: openclaw_mcp_adapter is defined }
    # gog after qmd — builds gog-mcp Docker image; plugins role registers the MCP server.
    - role: gog
      tags: [gog]
      when: gog_account is defined and gog_account | length > 0
    # plugins after gog — qmd/gog binaries must exist for MCP server registration + deny rules need agents.
    - { role: plugins,   tags: [plugins],   when: openclaw_mcp_adapter is defined }
    - { role: sandbox,   tags: [sandbox] }
    - role: workspace
      tags: [workspace]
      when: _openclaw_workspaces | selectattr('repo_url', 'ne', '') | selectattr('deploy_key', 'ne', '') | list | length > 0

  post_tasks:
    # Workaround for openclaw/openclaw#6070: `openclaw config set` strips nested
    # sensitive-only objects (e.g., tools.web.search.grok, channels.discord.token)
    # on subsequent writes. Inject these keys directly into the JSON file AFTER all
    # roles have finished their `openclaw config set` calls, so nothing can strip them.
    # Runs before handlers (which restart the gateway).
    - name: Write sensitive keys to temp file for JSON injection
      ansible.builtin.copy:
        content: "{{ _sensitive_keys | to_json }}"
        dest: /tmp/ansible-sensitive-keys.json
        mode: "0600"
      vars:
        _sensitive_keys:
          - path: ["plugins", "entries", "xai", "config", "webSearch", "apiKey"]
            value: "{{ xai_api_key | default('') }}"
            hash_name: "xai-api-key"
          - path: ["channels", "discord", "token"]
            value: "{{ discord_bot_token | default('') }}"
            hash_name: "discord-bot-token"
      no_log: true
      changed_when: false
      tags: [config, discord]

    - name: Inject sensitive nested keys into config JSON (openclaw#6070 workaround)
      ansible.builtin.shell: |
        set -euo pipefail
        python3 << 'PYEOF'
        import json, hashlib, os

        config_path = os.path.expanduser("~/.openclaw/openclaw.json")
        hash_dir = os.path.expanduser("~/.openclaw/.ansible-hashes")
        keys_path = "/tmp/ansible-sensitive-keys.json"
        os.makedirs(hash_dir, exist_ok=True)

        d = json.load(open(config_path))
        keys = json.load(open(keys_path))
        changed = []

        for entry in keys:
            value = entry["value"]
            if not value:
                continue
            path_parts = entry["path"]
            hash_name = entry["hash_name"]

            obj = d
            for part in path_parts[:-1]:
                obj = obj.setdefault(part, {})
            leaf = path_parts[-1]

            desired_hash = hashlib.sha256(value.encode()).hexdigest()
            hash_path = os.path.join(hash_dir, hash_name)
            try:
                current_hash = open(hash_path).read().strip()
            except FileNotFoundError:
                current_hash = ""

            if obj.get(leaf, "") == value and desired_hash == current_hash:
                continue

            obj[leaf] = value
            with open(hash_path, "w") as f:
                f.write(desired_hash + "\n")
            changed.append(".".join(path_parts))

        if changed:
            with open(config_path, "w") as f:
                json.dump(d, f, indent=2)
                f.write("\n")
            print("INJECTED: " + ", ".join(changed))
        else:
            print("OK")
        PYEOF
      args:
        executable: /bin/bash
      no_log: true
      register: sensitive_inject
      changed_when: "'INJECTED' in sensitive_inject.stdout"
      notify: restart openclaw-gateway
      tags: [config, discord]

    - name: Clean up sensitive keys temp file
      ansible.builtin.file:
        path: /tmp/ansible-sensitive-keys.json
        state: absent
      changed_when: false
      tags: [config, discord]

    - name: Ensure openclaw-gateway is started and enabled
      ansible.builtin.systemd:
        name: openclaw-gateway
        state: started
        enabled: true
        scope: user
      environment:
        XDG_RUNTIME_DIR: "/run/user/1000"
      tags: [docker, config, openclaw, sandbox, agents, plugins, qmd, gog, whatsapp, discord]

    - name: Wait for gateway to stabilize
      ansible.builtin.pause:
        seconds: 5
      tags: [docker, config, openclaw, sandbox, agents, plugins, qmd, gog, whatsapp, discord]

    - name: Verify gateway is active
      ansible.builtin.command: systemctl --user is-active openclaw-gateway
      environment:
        XDG_RUNTIME_DIR: "/run/user/1000"
      changed_when: false
      tags: [docker, config, openclaw, sandbox, agents, plugins, qmd, gog, whatsapp, discord]

    # After a gateway upgrade, security changes may invalidate device tokens.
    # Devices that reconnect will appear as pending pairing requests.
    # Since provisioning is already an admin action (requires SSH + Pulumi secrets),
    # auto-approving pending requests is not a privilege escalation — it completes
    # the upgrade by restoring connectivity that was already authorized.
    - name: Re-approve pending device pairing requests
      when: gateway_token is defined and gateway_token | length > 0
      tags: [openclaw]
      block:
        - name: Wait for devices to reconnect after gateway restart
          ansible.builtin.pause:
            seconds: 10

        - name: Read pending pairing requests
          ansible.builtin.slurp:
            src: /home/ubuntu/.openclaw/devices/pending.json
          register: pending_pairings_raw
          failed_when: false

        - name: Parse pending pairing requests
          ansible.builtin.set_fact:
            pending_devices: >-
              {{ (pending_pairings_raw.content | default('e30=') | b64decode | from_json | default({})) | dict2items }}

        - name: Approve pending pairing requests
          ansible.builtin.command:
            argv:
              - openclaw
              - devices
              - approve
              - "{{ item.value.requestId }}"
          environment:
            XDG_RUNTIME_DIR: "/run/user/1000"
            PATH: "/home/ubuntu/.npm-global/bin:{{ ansible_facts['env']['PATH'] }}"
            OPENCLAW_TOKEN: "{{ gateway_token }}"
          loop: "{{ pending_devices }}"
          loop_control:
            label: "{{ item.value.displayName | default(item.value.deviceId[:16]) }}"
          no_log: true
